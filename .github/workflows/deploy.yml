name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer push cancel an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
          # PayFast checkout config. Falls back to PayFast's published
          # sandbox test credentials when these secrets aren't set, so
          # the site keeps working (in test mode) before real credentials
          # are configured. Set these under Settings > Secrets and
          # variables > Actions once you have a live PayFast account.
          VITE_PAYFAST_MODE: ${{ vars.PAYFAST_MODE || 'sandbox' }}
          VITE_PAYFAST_MERCHANT_ID: ${{ secrets.PAYFAST_MERCHANT_ID }}
          VITE_PAYFAST_MERCHANT_KEY: ${{ secrets.PAYFAST_MERCHANT_KEY }}
          VITE_PAYFAST_PASSPHRASE: ${{ secrets.PAYFAST_PASSPHRASE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
